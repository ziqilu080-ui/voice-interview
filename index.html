<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语音面试官 | Voice Interview Practice</title>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text2: #9898b0;
    --accent: #6c5ce7;
    --accent2: #a78bfa;
    --green: #00d2a0;
    --red: #ff6b6b;
    --orange: #ffa940;
    --bubble-user: #1a1a2e;
    --bubble-ai: #1f1a2e;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .app {
    width: 100%;
    max-width: 800px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-radius: 0;
    overflow: hidden;
  }

  /* ============ Header ============ */
  .header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-weight: 700; font-size: 16px; }
  .header-subtitle { font-size: 12px; color: var(--text2); }
  .header-right { display: flex; gap: 8px; }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); background: #28283a; }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .btn-accent:hover { background: #7c6ff7; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ============ Setup Panel ============ */
  .setup-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .setup-overlay.hidden { display: none; }

  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 90%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .setup-panel h2 {
    font-size: 20px;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .setup-panel .desc {
    font-size: 13px; color: var(--text2); margin-bottom: 20px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  .form-group textarea { min-height: 70px; }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .api-key-wrapper { position: relative; }
  .api-key-wrapper input { padding-right: 40px; }
  .api-key-toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 16px; padding: 4px;
  }
  .browser-warning {
    background: #2a1f0a;
    border: 1px solid #5c4a1f;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--orange);
    margin-bottom: 16px;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .browser-warning.chrome-supported { display: none; }

  /* ============ Main Conversation ============ */
  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .conversation.empty {
    justify-content: center;
    align-items: center;
    text-align: center;
    color: var(--text2);
  }
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .empty-icon { font-size: 48px; opacity: 0.5; }
  .empty-text { font-size: 14px; line-height: 1.6; }
  .empty-hint { font-size: 12px; opacity: 0.6; }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .message.ai .msg-avatar { background: #2a1f3a; }
  .message.user .msg-avatar { background: #1a2a3a; }
  .msg-bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }
  .message.ai .msg-bubble {
    background: var(--bubble-ai);
    border: 1px solid #2a1a3a;
    border-top-left-radius: 4px;
  }
  .message.user .msg-bubble {
    background: var(--bubble-user);
    border: 1px solid #1a2a3a;
    border-top-right-radius: 4px;
  }
  .msg-time {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
  }
  .message.user .msg-time { text-align: right; }

  /* Interim speech */
  .interim-bubble {
    background: var(--bubble-user);
    border: 1px dashed var(--accent);
    opacity: 0.7;
    font-style: italic;
  }

  /* ============ Bottom Bar ============ */
  .bottom-bar {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    position: relative;
  }
  .mic-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .mic-btn:hover { border-color: var(--accent); }
  .mic-btn.recording {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(255,107,107,0); }
  }
  .mic-btn.processing {
    border-color: var(--orange);
    background: var(--orange);
    color: #fff;
  }

  .text-input-area {
    flex: 1;
    display: flex;
    gap: 8px;
  }
  .text-input-area input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 26px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .text-input-area input:focus { outline: none; border-color: var(--accent); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .send-btn:hover { background: #7c6ff7; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text2);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text2);
    flex-shrink: 0;
  }
  .status-dot.on { background: var(--green); }
  .status-dot.recording { background: var(--red); animation: pulse 1.5s ease infinite; }

  /* ============ Toasts ============ */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 200;
    animation: slideDown 0.3s ease;
    pointer-events: none;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .toast.error { background: #4a1a1a; color: var(--red); border: 1px solid #6b2a2a; }
  .toast.success { background: #1a2a1a; color: var(--green); border: 1px solid #2a5a2a; }
  .toast.info { background: #1a1a3a; color: var(--accent2); border: 1px solid #2a2a5a; }

  /* ============ Settings Panel ============ */
  .interview-info {
    padding: 8px 20px;
    background: var(--bg);
    font-size: 12px;
    color: var(--text2);
    display: flex; gap: 16px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .interview-info span { display: flex; align-items: center; gap: 4px; }

  /* ============ Scrollbar ============ */
  .conversation::-webkit-scrollbar { width: 4px; }
  .conversation::-webkit-scrollbar-track { background: transparent; }
  .conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 600px) {
    .app { max-width: 100%; border-radius: 0; }
    .msg-bubble { max-width: 85%; }
    .form-row { flex-direction: column; gap: 0; }
    .setup-panel { padding: 20px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🎙️</div>
      <div>
        <div class="header-title">语音面试官</div>
        <div class="header-subtitle">AI-Powered Voice Interview</div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn btn-sm" onclick="toggleSpeaker()" id="speakerBtn" title="语音播报">🔊 播报中</button>
      <button class="btn btn-sm" onclick="openSettings()">⚙️ 设置</button>
      <button class="btn btn-sm" onclick="exportChat()">📋 导出</button>
      <button class="btn btn-sm" onclick="resetInterview()">🔄 重置</button>
    </div>
  </div>

  <!-- Interview Info Bar -->
  <div class="interview-info" id="infoBar">
    <span>🏢 <span id="infoCompany">未设置</span></span>
    <span>💼 <span id="infoRole">未设置</span></span>
    <span>📝 <span id="infoRound">未设置</span></span>
    <span>📊 <span id="infoProgress">Q0/0</span></span>
  </div>

  <!-- Conversation Area -->
  <div class="conversation empty" id="conversation">
    <div class="empty-state">
      <div class="empty-icon">🎤</div>
      <div class="empty-text">准备好开始语音面试了吗？</div>
      <div class="empty-hint">点击下方麦克风按钮，说出你的回答<br>或先点击 ⚙️ 设置面试参数</div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="点击开始/停止录音">
      🎤
    </button>
    <div class="text-input-area">
      <input type="text" id="textInput" placeholder="或者直接输入文字回答..." onkeydown="if(event.key==='Enter')sendText()">
      <button class="send-btn" id="sendBtn" onclick="sendText()" disabled>↑</button>
    </div>
  </div>
  <div class="status-bar" style="padding: 0 20px 12px;">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">就绪 - 请先设置面试参数</span>
  </div>
</div>

<!-- Setup Overlay -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-panel">
    <h2>⚙️ 面试设置</h2>
    <p class="desc">配置你的面试信息，让 AI 面试官更懂你</p>

    <div class="browser-warning" id="browserWarning">
      <span>⚠️</span>
      <span>语音识别功能需要 Chrome 浏览器。如使用其他浏览器，语音功能可能不可用，但文字输入仍可正常使用。</span>
    </div>

    <div class="form-group">
      <label>🧠 API 服务商</label>
      <select id="provider">
        <option value="deepseek" selected>DeepSeek（推荐，国内可用）</option>
        <option value="anthropic">Anthropic Claude</option>
      </select>
    </div>

    <div class="form-group">
      <label>🔑 API Key</label>
      <div class="api-key-wrapper">
        <input type="password" id="apiKey" placeholder="DeepSeek: sk-... | Anthropic: sk-ant-...">
        <button class="api-key-toggle" onclick="toggleApiKey()">👁️</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>🏢 目标公司</label>
        <input type="text" id="company" placeholder="如：字节跳动、腾讯、美团...">
      </div>
      <div class="form-group">
        <label>💼 目标岗位</label>
        <input type="text" id="role" placeholder="如：产品经理、增长PM...">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>📝 面试轮次</label>
        <select id="round">
          <option value="初面">初面（业务面）</option>
          <option value="二面" selected>二面（深度面）</option>
          <option value="终面">终面（总监/HR）</option>
          <option value="群面">群面</option>
          <option value="case面试">Case 面试</option>
        </select>
      </div>
      <div class="form-group">
        <label>📊 面试题数</label>
        <select id="questionCount">
          <option value="4">4 题（快速）</option>
          <option value="6" selected>6 题（标准）</option>
          <option value="8">8 题（深度）</option>
          <option value="10">10 题（全面）</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>🎤 面试官声音（Edge 神经网络）</label>
        <select id="voiceSelect">
          <option value="zh-CN-YunyangNeural">👨‍💼 Yunyang - 男声 · 专业可靠（推荐）</option>
          <option value="zh-CN-YunxiNeural">👨‍💼 Yunxi - 男声 · 阳光活力</option>
          <option value="zh-CN-YunjianNeural">👨‍💼 Yunjian - 男声 · 激情有力</option>
          <option value="zh-CN-XiaoxiaoNeural">👩‍💼 Xiaoxiao - 女声 · 温暖知性</option>
          <option value="zh-CN-XiaoyiNeural">👩‍💼 Xiaoyi - 女声 · 活泼亲切</option>
        </select>
      </div>
      <div class="form-group">
        <label>⚡ 语速: <span id="rateLabel">+30%</span></label>
        <input type="range" id="voiceRate" min="-50" max="100" step="5" value="30"
               oninput="document.getElementById('rateLabel').textContent = (this.value > 0 ? '+' : '') + this.value + '%'"
               style="width:100%;accent-color:var(--accent);">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);">
          <span>-50% 慢</span><span>0% 正常</span><span>+30% 推荐</span><span>+100% 快</span>
        </div>
      </div>
    </div>
    <button class="btn btn-sm" onclick="applyVoiceSettings()" style="margin-bottom:16px;">🔊 试听语音</button>

    <div class="form-group">
      <label>👤 你的背景（简要介绍）</label>
      <textarea id="background" placeholder="例：3年B端产品经验，做过从0到1的SaaS产品，负责过增长和商业化..."></textarea>
    </div>

    <div class="form-group">
      <label>📋 岗位 JD（可选，粘贴职位描述）</label>
      <textarea id="jd" placeholder="粘贴职位 JD，让面试官更精准地提问..."></textarea>
    </div>

    <button class="btn btn-accent" style="width:100%;padding:12px;font-size:15px;" onclick="saveSettings()">
      ✅ 保存并开始面试
    </button>
  </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script>
// ==================== GLOBAL STATE ====================
const STATE = {
  apiKey: '',
  provider: 'deepseek',  // 'deepseek' | 'anthropic'
  company: '',
  role: '',
  round: '二面',
  questionCount: 6,
  background: '',
  jd: '',
  conversation: [],     // {role: 'user'|'assistant', content: string}
  isRecording: false,
  isProcessing: false,
  speakerEnabled: true,
  voiceName: 'zh-CN-YunyangNeural',  // Edge TTS neural voice
  voiceRate: '+30%',                  // Edge TTS rate: '-50%' to '+100%'
  currentAudio: null,                 // Currently playing Audio element
  questionIndex: 0,
  recognition: null,
  interimText: '',
  finalText: '',
};

// ==================== INITIALIZATION ====================
function init() {
  // Load saved settings
  STATE.apiKey = localStorage.getItem('vi_apiKey') || '';
  STATE.provider = localStorage.getItem('vi_provider') || 'deepseek';
  STATE.company = localStorage.getItem('vi_company') || '';
  STATE.role = localStorage.getItem('vi_role') || '';
  STATE.round = localStorage.getItem('vi_round') || '二面';
  STATE.questionCount = parseInt(localStorage.getItem('vi_qc') || '6');
  STATE.voiceName = localStorage.getItem('vi_voice') || 'zh-CN-YunyangNeural';
  STATE.voiceRate = localStorage.getItem('vi_rate') || '+30%';
  STATE.background = localStorage.getItem('vi_bg') || '';
  STATE.jd = localStorage.getItem('vi_jd') || '';

  // Populate form
  document.getElementById('provider').value = STATE.provider;
  document.getElementById('apiKey').value = STATE.apiKey;
  document.getElementById('company').value = STATE.company;
  document.getElementById('role').value = STATE.role;
  document.getElementById('round').value = STATE.round;
  document.getElementById('questionCount').value = STATE.questionCount;
  document.getElementById('voiceSelect').value = STATE.voiceName;
  document.getElementById('voiceRate').value = parseInt(STATE.voiceRate);
  document.getElementById('rateLabel').textContent = STATE.voiceRate;
  document.getElementById('background').value = STATE.background;
  document.getElementById('jd').value = STATE.jd;

  // Check browser
  const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
  if (isChrome) {
    document.getElementById('browserWarning').classList.add('chrome-supported');
  }

  // Check if setup is needed
  if (!STATE.apiKey || !STATE.company || !STATE.role) {
    document.getElementById('setupOverlay').classList.remove('hidden');
    updateStatus('idle', '请先设置面试参数');
  } else {
    updateInfoBar();
    updateStatus('idle', '就绪 - 点击麦克风开始回答');
  }

  // Init speech recognition
  initSpeechRecognition();

  // Init text input state
  updateSendButton();
  document.getElementById('textInput').addEventListener('input', updateSendButton);
}

function updateSendButton() {
  const val = document.getElementById('textInput').value.trim();
  document.getElementById('sendBtn').disabled = !val || STATE.isProcessing;
}

// ==================== UI HELPERS ====================
function updateStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot';
  if (state === 'idle') dot.classList.add('on');
  if (state === 'recording') dot.classList.add('recording');
  document.getElementById('statusText').textContent = text;
}

function updateInfoBar() {
  document.getElementById('infoCompany').textContent = STATE.company || '未设置';
  document.getElementById('infoRole').textContent = STATE.role || '未设置';
  document.getElementById('infoRound').textContent = STATE.round || '未设置';
  document.getElementById('infoProgress').textContent = `Q${STATE.questionIndex}/${STATE.questionCount}`;
}

function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function scrollToBottom() {
  const conv = document.getElementById('conversation');
  setTimeout(() => { conv.scrollTop = conv.scrollHeight; }, 100);
}

// ==================== CONVERSATION RENDERING ====================
function renderConversation() {
  const conv = document.getElementById('conversation');
  conv.innerHTML = '';

  if (STATE.conversation.length === 0) {
    conv.classList.add('empty');
    conv.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎤</div>
        <div class="empty-text">准备好开始语音面试了吗？</div>
        <div class="empty-hint">点击下方麦克风按钮，说出你的回答<br>或直接输入文字</div>
      </div>`;
    return;
  }

  conv.classList.remove('empty');

  STATE.conversation.forEach((msg, i) => {
    const div = document.createElement('div');
    div.className = `message ${msg.role === 'user' ? 'user' : 'ai'}`;
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `
      <div class="msg-avatar">${msg.role === 'user' ? '👤' : '🤖'}</div>
      <div>
        <div class="msg-bubble">${escapeHtml(msg.content)}</div>
        <div class="msg-time">${time}</div>
      </div>`;
    conv.appendChild(div);
  });

  // Show interim text if recording
  if (STATE.interimText) {
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `
      <div class="msg-avatar">👤</div>
      <div>
        <div class="msg-bubble interim-bubble">${escapeHtml(STATE.interimText)}...</div>
      </div>`;
    conv.appendChild(div);
  }

  scrollToBottom();
}

function addMessage(role, content) {
  STATE.conversation.push({ role, content });
  renderConversation();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ==================== SPEECH RECOGNITION ====================
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.warn('SpeechRecognition not available');
    return;
  }

  STATE.recognition = new SpeechRecognition();
  STATE.recognition.continuous = true;
  STATE.recognition.interimResults = true;
  STATE.recognition.lang = 'zh-CN';

  STATE.recognition.onresult = (event) => {
    let interim = '';
    let final = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result = event.results[i];
      if (result.isFinal) {
        final += result[0].transcript;
      } else {
        interim += result[0].transcript;
      }
    }

    STATE.interimText = interim;
    if (final) {
      STATE.finalText += final;
    }

    renderConversation();
  };

  STATE.recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    if (event.error === 'not-allowed') {
      showToast('麦克风权限被拒绝，请在浏览器设置中允许麦克风权限', 'error');
    }
    stopRecording();
  };

  STATE.recognition.onend = () => {
    // If we were recording and it ends unexpectedly (not by user), restart
    if (STATE.isRecording) {
      try {
        STATE.recognition.start();
      } catch (e) {
        stopRecording();
      }
    }
  };

  // Auto-stop after silence
  let silenceTimer;
  STATE.recognition.onspeechend = () => {
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => {
      if (STATE.isRecording && STATE.finalText.trim()) {
        stopRecordingAndSend();
      }
    }, 1500);
  };

  STATE.recognition.onspeechstart = () => {
    clearTimeout(silenceTimer);
  };
}

async function toggleMic() {
  if (STATE.isRecording) {
    stopRecordingAndSend();
    return;
  }

  if (STATE.isProcessing) return;

  // Check setup
  if (!STATE.apiKey || !STATE.company || !STATE.role) {
    showToast('请先完成面试设置', 'error');
    document.getElementById('setupOverlay').classList.remove('hidden');
    return;
  }

  await startRecording();
}

async function startRecording() {
  if (!STATE.recognition) {
    showToast('你的浏览器不支持语音识别，请使用 Chrome 浏览器，或使用文字输入', 'error');
    return;
  }

  try {
    STATE.finalText = '';
    STATE.interimText = '';
    STATE.isRecording = true;

    STATE.recognition.start();

    const micBtn = document.getElementById('micBtn');
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹️';
    micBtn.title = '点击停止录音';

    updateStatus('recording', '录音中...说完了点击停止');
    updateSendButton();
    renderConversation();
  } catch (e) {
    console.error('Failed to start recording:', e);
    showToast('启动录音失败，请检查麦克风权限', 'error');
    STATE.isRecording = false;
  }
}

function stopRecording() {
  STATE.isRecording = false;
  if (STATE.recognition) {
    try { STATE.recognition.stop(); } catch (e) {}
  }

  const micBtn = document.getElementById('micBtn');
  micBtn.classList.remove('recording');
  micBtn.textContent = '🎤';
  micBtn.title = '点击开始录音';
}

async function stopRecordingAndSend() {
  stopRecording();
  const text = STATE.finalText.trim();
  STATE.interimText = '';
  STATE.finalText = '';

  if (text) {
    await sendToClaude(text);
  } else {
    updateStatus('idle', '未检测到语音内容，请重试');
    renderConversation();
  }
}

// ==================== NEURAL TTS (Edge TTS via server proxy) ====================
async function speak(text) {
  if (!STATE.speakerEnabled) return;

  // Cancel any ongoing audio
  stopAudio();

  try {
    const response = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        voice: STATE.voiceName,
        rate: STATE.voiceRate,
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `TTS HTTP ${response.status}`);
    }

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);

    STATE.currentAudio = audio;

    await new Promise((resolve, reject) => {
      audio.onended = () => {
        URL.revokeObjectURL(url);
        STATE.currentAudio = null;
        resolve();
      };
      audio.onerror = () => {
        URL.revokeObjectURL(url);
        STATE.currentAudio = null;
        reject(new Error('Audio playback failed'));
      };
      audio.play().catch(reject);
    });

  } catch (error) {
    console.error('TTS error:', error);
    // Silently fail - don't interrupt the interview flow
  }
}

function stopAudio() {
  if (STATE.currentAudio) {
    STATE.currentAudio.pause();
    STATE.currentAudio = null;
  }
}

        rate: rate,
      }),
    });

    if (!response.ok) throw new Error('TTS failed');

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    STATE.currentAudio = audio;

    audio.onended = () => {
      URL.revokeObjectURL(url);
      STATE.currentAudio = null;
    };
    audio.onerror = () => {

}

async function sendToClaude(text) {
  if (STATE.isProcessing) return;
  STATE.isProcessing = true;

  // Add user message
  addMessage('user', text);

  // Update UI
  const micBtn = document.getElementById('micBtn');
  micBtn.classList.add('processing');
  document.getElementById('sendBtn').disabled = true;
  updateStatus('idle', '面试官思考中...');

  // Create a placeholder for the AI response
  const aiMsgIndex = STATE.conversation.length;
  addMessage('assistant', '...');

  try {
    const messages = buildMessages(text);
    const response = await callClaudeAPI(messages);

    // Replace placeholder with actual response
    STATE.conversation[aiMsgIndex].content = response;
    renderConversation();

    // Speak the response
    speak(response);

    // Update progress
    updateProgress(response);

  } catch (error) {
    console.error('Claude API error:', error);
    STATE.conversation[aiMsgIndex].content = `抱歉，出错了：${error.message}`;
    renderConversation();
    showToast('API 调用失败: ' + error.message, 'error');
  } finally {
    STATE.isProcessing = false;
    micBtn.classList.remove('processing');
    document.getElementById('sendBtn').disabled = false;
    updateStatus('idle', '就绪 - 继续回答吧');
  }
}

function buildMessages(userText) {
  // Build messages array from conversation history
  const messages = [];
  const fullConversation = [...STATE.conversation];
  // Remove the last AI placeholder
  fullConversation.pop();

  // Add all conversation turns
  for (let i = 0; i < fullConversation.length; i++) {
    const msg = fullConversation[i];
    messages.push({
      role: msg.role === 'user' ? 'user' : 'assistant',
      content: msg.content
    });
  }

  // If this is the first message, prepend with a start signal
  if (messages.length === 1 && messages[0].role === 'user') {
    messages.unshift({
      role: 'user',
      content: '你好，我准备好了，请开始面试吧。'
    });
  }

  return messages;
}

function getApiBaseUrl() {
  // Use proxy when running on localhost (solves CORS)
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    if (STATE.provider === 'deepseek') return '/api/deepseek';
    return '/api/anthropic';
  }
  // Direct API calls (may have CORS issues)
  if (STATE.provider === 'deepseek') return 'https://api.deepseek.com/v1/chat/completions';
  return 'https://api.anthropic.com/v1/messages';
}

function getModelName() {
  if (STATE.provider === 'deepseek') return 'deepseek-chat';
  return 'claude-sonnet-4-6';
}

async function callClaudeAPI(messages) {
  const apiUrl = getApiBaseUrl();
  const isProxy = apiUrl.startsWith('/');
  const isDeepSeek = STATE.provider === 'deepseek';

  const headers = {
    'Content-Type': 'application/json',
    'x-api-key': STATE.apiKey,
  };

  // For direct Anthropic access (not needed with proxy)
  if (!isProxy && !isDeepSeek) {
    headers['anthropic-version'] = '2023-06-01';
    headers['anthropic-dangerous-direct-browser-access'] = 'true';
  }

  let body;
  if (isDeepSeek) {
    // DeepSeek: OpenAI-compatible chat completions format
    const systemPrompt = buildSystemPrompt();
    const chatMessages = [
      { role: 'system', content: systemPrompt },
      ...messages.map(m => ({
        role: m.role === 'user' ? 'user' : 'assistant',
        content: m.content,
      })),
    ];
    body = JSON.stringify({
      model: getModelName(),
      messages: chatMessages,
      max_tokens: 1024,
      temperature: 0.7,
    });
  } else {
    // Anthropic: Messages API format
    body = JSON.stringify({
      model: getModelName(),
      max_tokens: 1024,
      system: buildSystemPrompt(),
      messages: messages,
    });
  }

  const response = await fetch(apiUrl, {
    method: 'POST',
    headers: headers,
    body: body,
  });

  if (!response.ok) {
    const errorBody = await response.text();
    let errorMsg;
    try {
      const err = JSON.parse(errorBody);
      errorMsg = err.error?.message || err.message || errorBody;
    } catch {
      errorMsg = errorBody;
    }
    throw new Error(`API 错误 (${response.status}): ${errorMsg}`);
  }

  const data = await response.json();

  // Parse response based on provider
  if (isDeepSeek) {
    // DeepSeek: choices[0].message.content
    if (!data.choices || !data.choices[0]?.message?.content) {
      throw new Error('DeepSeek 返回格式异常: ' + JSON.stringify(data));
    }
    return data.choices[0].message.content;
  } else {
    // Anthropic: content[0].text
    if (!data.content || !data.content[0]?.text) {
      throw new Error('Claude 返回格式异常: ' + JSON.stringify(data));
    }
    return data.content[0].text;
  }
}

function updateProgress(response) {
  // Count questions by detecting question patterns
  const questionPatterns = [
    /第\s*(\d+)\s*[道题个]/,
    /下一[道题个]/,
    /面试环节结束/,
    /整体评估/,
    /总结一下/,
  ];

  // Simple heuristic: if response contains question-like patterns, increment
  if (/第\s*(\d+)\s*道/.test(response)) {
    const match = response.match(/第\s*(\d+)\s*道/);
    if (match) {
      STATE.questionIndex = parseInt(match[1]);
    }
  } else if (/下一[道题个]/.test(response) && STATE.questionIndex < STATE.questionCount) {
    STATE.questionIndex++;
  }

  // Check if interview is ending
  if (/面试环节结束|整体评估|总结一下你的表现/.test(response)) {
    STATE.questionIndex = STATE.questionCount;
  }

  updateInfoBar();
}

async function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text || STATE.isProcessing) return;

  input.value = '';
  updateSendButton();

  if (STATE.isRecording) {
    stopRecording();
  }

  await sendToClaude(text);
}

// ==================== SETUP / SETTINGS ====================
function openSettings() {
  document.getElementById('setupOverlay').classList.remove('hidden');
}

function toggleApiKey() {
  const input = document.getElementById('apiKey');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function saveSettings() {
  const provider = document.getElementById('provider').value;
  const apiKey = document.getElementById('apiKey').value.trim();
  const company = document.getElementById('company').value.trim();
  const role = document.getElementById('role').value.trim();
  const round = document.getElementById('round').value;
  const questionCount = parseInt(document.getElementById('questionCount').value);
  const voiceName = document.getElementById('voiceSelect').value;
  const voiceRateVal = parseInt(document.getElementById('voiceRate').value);
  const voiceRate = (voiceRateVal > 0 ? '+' : '') + voiceRateVal + '%';
  const background = document.getElementById('background').value.trim();
  const jd = document.getElementById('jd').value.trim();

  if (!apiKey) { showToast('请输入 API Key', 'error'); return; }
  if (!company) { showToast('请输入目标公司', 'error'); return; }
  if (!role) { showToast('请输入目标岗位', 'error'); return; }

  STATE.provider = provider;
  STATE.apiKey = apiKey;
  STATE.company = company;
  STATE.role = role;
  STATE.round = round;
  STATE.questionCount = questionCount;
  STATE.voiceName = voiceName;
  STATE.voiceRate = voiceRate;
  STATE.background = background;
  STATE.jd = jd;
  STATE.questionIndex = 0;
  STATE.conversation = [];

  // Persist
  localStorage.setItem('vi_provider', provider);
  localStorage.setItem('vi_apiKey', apiKey);
  localStorage.setItem('vi_company', company);
  localStorage.setItem('vi_role', role);
  localStorage.setItem('vi_round', round);
  localStorage.setItem('vi_qc', questionCount);
  localStorage.setItem('vi_voice', voiceName);
  localStorage.setItem('vi_rate', voiceRate);
  localStorage.setItem('vi_bg', background);
  localStorage.setItem('vi_jd', jd);

  // Close setup
  document.getElementById('setupOverlay').classList.add('hidden');
  updateInfoBar();
  renderConversation();
  updateStatus('idle', '就绪 - 点击麦克风开始回答');

  // Auto-start the interview with a greeting from the AI
  autoStartInterview();
}

async function autoStartInterview() {
  STATE.questionIndex = 0;
  updateInfoBar();

  showToast('面试即将开始...', 'success');

  // Send initial message to get the first question
  await sendToClaude('你好，我准备好了，请开始面试吧。');
}

// ==================== EXPORT ====================
function exportChat() {
  if (STATE.conversation.length === 0) {
    showToast('没有对话内容可导出', 'error');
    return;
  }

  let text = `语音面试记录\n`;
  text += `公司: ${STATE.company} | 岗位: ${STATE.role} | 轮次: ${STATE.round}\n`;
  text += `时间: ${new Date().toLocaleString('zh-CN')}\n`;
  text += `${'='.repeat(50)}\n\n`;

  STATE.conversation.forEach(msg => {
    const label = msg.role === 'user' ? '👤 候选人' : '🤖 面试官';
    text += `${label}:\n${msg.content}\n\n`;
  });

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `面试记录_${STATE.company}_${STATE.role}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);

  showToast('面试记录已导出', 'success');
}

function resetInterview() {
  if (STATE.conversation.length > 0) {
    if (!confirm('确定要重置面试吗？当前对话将被清空。')) return;
  }

  STATE.conversation = [];
  STATE.questionIndex = 0;
  STATE.interimText = '';
  STATE.finalText = '';

  if (STATE.isRecording) stopRecording();
  stopAudio();

  updateInfoBar();
  renderConversation();
  updateStatus('idle', '面试已重置 - 点击麦克风重新开始');
  showToast('面试已重置', 'info');
}

// ==================== KEYBOARD SHORTCUTS ====================
document.addEventListener('keydown', (e) => {
  // Space to toggle mic (only when not typing in input)
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    toggleMic();
  }
  // Escape to open settings
  if (e.code === 'Escape' && !document.getElementById('setupOverlay').classList.contains('hidden')) {
    document.getElementById('setupOverlay').classList.add('hidden');
  }
});

// ==================== START ====================
init();
</script>
